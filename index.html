<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Studio Pro v3</title>
    <style>
        /* Modern UI Variables */
        :root {
            --primary: #00e5ff;
            --danger: #ff1744;
            --success: #00e676;
            --warning: #ffea00;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        h2 { text-align: center; margin: 0; font-weight: 300; letter-spacing: 1px; color: var(--primary); }
        
        .card {
            background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); padding: 20px; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 15px; color: #aaa; border-bottom: 1px solid var(--card-border); padding-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Media Players */
        video { width: 100%; border-radius: 12px; display: none; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #yt-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; display: none; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #yt-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Inputs & Buttons */
        .input-group { display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.2); color: white; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        
        button {
            background: var(--primary); color: #000; border: none; padding: 12px 16px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4); }
        button:disabled { background: rgba(255,255,255,0.1); color: #666; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-yt { background: var(--danger); color: white; }
        .btn-yt:hover:not(:disabled) { box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4); }
        .btn-mic { width: 100%; padding: 16px; font-size: 16px; margin-bottom: 15px; }
        .btn-auto { background: #ab47bc; color: white; width: 100%; margin-bottom: 15px; }
        .btn-auto:hover:not(:disabled) { box-shadow: 0 4px 15px rgba(171, 71, 188, 0.4); }
        
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 15px; }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .file-upload-btn { background: rgba(255,255,255,0.1); color: white; width: 100%; text-align: center; border: 1px dashed var(--card-border); }

        /* Sliders */
        .slider-group { margin-bottom: 15px; }
        .slider-group:last-child { margin-bottom: 0; }
        label.slider-label { font-size: 13px; font-weight: 500; color: #eee; display: flex; justify-content: space-between; margin-bottom: 8px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; transition: 0.2s; }
        input[type="range"]:disabled::-webkit-slider-thumb { background: #666; }

        /* Recorder */
        .rec-controls { display: flex; gap: 10px; margin-top: 10px; }
        .rec-controls button { flex: 1; }
        #start-rec { background: var(--danger); color: white; }
        #stop-rec { background: rgba(255,255,255,0.1); color: white; }
        #download-link { display: none; text-align: center; margin-top: 15px; background: var(--success); padding: 12px; border-radius: 8px; text-decoration: none; color: black; font-weight: bold; }
        .rec-warning { font-size: 12px; color: var(--warning); text-align: center; margin-top: 10px; display: none; }
        
        .badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
        .badge-pro { background: #ab47bc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Karaoke Studio</h2>

    <!-- Media Source -->
    <div class="card">
        <div class="card-header">1. Select Media</div>
        <div class="file-upload-wrapper">
            <button class="file-upload-btn">📁 Choose Local Video (Enables Recording)</button>
            <input type="file" id="video-upload" accept="video/*">
        </div>
        <div class="input-group">
            <input type="text" id="yt-url" placeholder="Paste YouTube Link...">
            <button class="btn-yt" id="yt-load-btn">Load YT</button>
        </div>
    </div>

    <!-- Players -->
    <video id="local-video" controls playsinline></video>
    <div id="yt-container"></div>

    <!-- Audio Mixer -->
    <div class="card">
        <div class="card-header">2. Vocal Mixer</div>
        <button class="btn-mic" id="start-mic-btn">🎤 Turn On Microphone</button>
        
        <div class="slider-group">
            <label class="slider-label">Mic Boost <span id="mic-val">100%</span></label>
            <input type="range" id="mic-volume" min="0" max="5" step="0.1" value="1" disabled>
        </div>
        <div class="slider-group">
            <label class="slider-label">Echo / Reverb <span id="echo-val">20%</span></label>
            <input type="range" id="echo-volume" min="0" max="1" step="0.05" value="0.2" disabled>
        </div>
        <div class="slider-group" id="local-vid-vol-container">
            <label class="slider-label">Music Volume <span id="vid-val">100%</span></label>
            <input type="range" id="video-volume" min="0" max="2" step="0.1" value="1" disabled>
        </div>
    </div>

    <!-- Anti-Feedback Engine -->
    <div class="card" id="feedback-panel">
        <div class="card-header">
            3. Smart Anti-Feedback 
            <span class="badge badge-pro">AI</span>
        </div>
        <button class="btn-auto" id="auto-calibrate-btn" disabled>✨ Auto-Calibrate to Room</button>
        
        <div class="slider-group">
            <label class="slider-label">Hum Reducer (Low Cut) <span id="hum-val">20 Hz</span></label>
            <input type="range" id="hum-filter" min="20" max="400" step="10" value="20" disabled>
        </div>
        <div class="slider-group">
            <label class="slider-label">Screech Reducer (High Cut) <span id="screech-val">20000 Hz</span></label>
            <input type="range" id="screech-filter" min="4000" max="20000" step="500" value="20000" disabled>
        </div>
    </div>

    <!-- Recorder -->
    <div class="card" id="rec-panel">
        <div class="card-header">
            4. Session Recorder
            <span class="badge">REC</span>
        </div>
        <p class="rec-warning" id="rec-warning">⚠️ Recording is locked. Choose a Local Video to enable.</p>
        <div class="rec-controls">
            <button id="start-rec" disabled>🔴 Start</button>
            <button id="stop-rec" disabled>⏹ Stop & Save</button>
        </div>
        <a id="download-link" href="#">⬇️ Download Performance</a>
    </div>
</div>

<script>
    // Elements
    const videoUpload = document.getElementById('video-upload');
    const ytUrlInput = document.getElementById('yt-url');
    const ytLoadBtn = document.getElementById('yt-load-btn');
    const localVideo = document.getElementById('local-video');
    const ytContainer = document.getElementById('yt-container');
    const startMicBtn = document.getElementById('start-mic-btn');
    const autoCalibrateBtn = document.getElementById('auto-calibrate-btn');
    
    // Audio Sliders
    const micSlider = document.getElementById('mic-volume');
    const echoSlider = document.getElementById('echo-volume');
    const videoSlider = document.getElementById('video-volume');
    const humSlider = document.getElementById('hum-filter');
    const screechSlider = document.getElementById('screech-filter');
    
    // Recording Elements
    const startRecBtn = document.getElementById('start-rec');
    const stopRecBtn = document.getElementById('stop-rec');
    const downloadLink = document.getElementById('download-link');
    const recWarning = document.getElementById('rec-warning');

    let audioCtx, micSource, micGain, videoGain, delayNode, feedbackNode, compressor, audioDest;
    let humFilterNode, screechFilterNode;
    let isMicActive = false, usingLocalVideo = false;
    let mediaRecorder, recordedChunks = [];

    // --- MEDIA HANDLING ---
    videoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            ytContainer.style.display = 'none';
            localVideo.src = URL.createObjectURL(file);
            localVideo.style.display = 'block';
            usingLocalVideo = true;
            document.querySelector('.file-upload-btn').textContent = `📁 ${file.name.substring(0, 20)}...`;
            
            // Unlock Recorder
            recWarning.style.display = 'none';
            if(isMicActive) startRecBtn.disabled = false;
        }
    });

    ytLoadBtn.addEventListener('click', () => {
        const ytId = ytUrlInput.value.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
        if (ytId && ytId[2].length === 11) {
            localVideo.style.display = 'none'; localVideo.pause();
            usingLocalVideo = false;
            ytContainer.style.display = 'block';
            ytContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId[2]}?autoplay=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            
            // Lock Recorder
            recWarning.style.display = 'block';
            recWarning.textContent = "⚠️ YouTube loaded. Recording is disabled due to browser security rules.";
            startRecBtn.disabled = true;
        } else alert("Invalid YouTube link");
    });

    // --- AUDIO MIXER & ANTI-FEEDBACK ---
    startMicBtn.addEventListener('click', async () => {
        if (isMicActive) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: false } 
            });

            micSource = audioCtx.createMediaStreamSource(stream);
            
            humFilterNode = audioCtx.createBiquadFilter();
            humFilterNode.type = 'highpass'; humFilterNode.frequency.value = 20;

            screechFilterNode = audioCtx.createBiquadFilter();
            screechFilterNode.type = 'lowpass'; screechFilterNode.frequency.value = 20000;

            micGain = audioCtx.createGain();
            compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.value = -30; compressor.ratio.value = 12;

            delayNode = audioCtx.createDelay(); delayNode.delayTime.value = 0.25; 
            feedbackNode = audioCtx.createGain(); feedbackNode.gain.value = 0.2; 
            audioDest = audioCtx.createMediaStreamDestination();

            // Routing
            micSource.connect(humFilterNode);
            humFilterNode.connect(screechFilterNode);
            screechFilterNode.connect(micGain);
            
            micGain.connect(compressor); 
            micGain.connect(delayNode);  
            delayNode.connect(feedbackNode);
            feedbackNode.connect(delayNode); 
            delayNode.connect(compressor); 
            
            compressor.connect(audioCtx.destination);
            compressor.connect(audioDest);

            if (!videoGain) {
                const videoSource = audioCtx.createMediaElementSource(localVideo);
                videoGain = audioCtx.createGain();
                videoSource.connect(videoGain);
                videoGain.connect(audioCtx.destination);
                videoGain.connect(audioDest);
            }

            // Enable UI
            [micSlider, echoSlider, videoSlider, humSlider, screechSlider].forEach(s => s.disabled = false);
            autoCalibrateBtn.disabled = false;
            if (usingLocalVideo) startRecBtn.disabled = false;
            
            startMicBtn.style.background = "var(--success)";
            startMicBtn.textContent = "🎙️ Mic & Filters Active";
            isMicActive = true;
            
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        } catch (err) { alert("Mic Error. Check permissions/HTTPS."); }
    });

    // --- AUTO CALIBRATE LOGIC ---
    autoCalibrateBtn.addEventListener('click', () => {
        autoCalibrateBtn.disabled = true;
        autoCalibrateBtn.textContent = "🤫 Listening to room (3s)...";
        
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        micSource.connect(analyser); // Tap into raw mic input
        
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        
        let lowNoise = 0, highNoise = 0, totalNoise = 0, samples = 0;
        
        const sampleInterval = setInterval(() => {
            analyser.getByteFrequencyData(dataArray);
            for(let i=0; i<bufferLength; i++) {
                let freq = i * (audioCtx.sampleRate / 2) / bufferLength;
                let val = dataArray[i];
                totalNoise += val;
                if (freq < 400) lowNoise += val;
                if (freq > 4000) highNoise += val;
            }
            samples++;
        }, 100);
        
        setTimeout(() => {
            clearInterval(sampleInterval);
            
            // Averages
            lowNoise = (lowNoise / samples) / (400 / (audioCtx.sampleRate/2/bufferLength));
            highNoise = (highNoise / samples) / ((audioCtx.sampleRate/2 - 4000) / (audioCtx.sampleRate/2/bufferLength));
            totalNoise = (totalNoise / samples) / bufferLength;
            
            // Smart Calculations
            let newHum = 20, newScreech = 20000, newBoost = 1.5;
            
            if (lowNoise > 30) newHum = 150;
            if (lowNoise > 80) newHum = 250;
            
            if (highNoise > 20) newScreech = 12000;
            if (highNoise > 60) newScreech = 8000;
            
            if (totalNoise < 10) newBoost = 3.5; // Quiet room, boost mic
            else if (totalNoise > 40) newBoost = 1.0; // Loud room, lower mic
            
            // Apply to Audio Nodes
            humFilterNode.frequency.value = newHum;
            screechFilterNode.frequency.value = newScreech;
            micGain.gain.value = newBoost;
            
            // Update UI Sliders
            humSlider.value = newHum; document.getElementById('hum-val').textContent = newHum + " Hz";
            screechSlider.value = newScreech; document.getElementById('screech-val').textContent = newScreech + " Hz";
            micSlider.value = newBoost; document.getElementById('mic-val').textContent = Math.round(newBoost * 100) + "%";
            
            autoCalibrateBtn.textContent = "✅ Calibrated Successfully!";
            autoCalibrateBtn.style.background = "var(--success)";
            
            setTimeout(() => {
                autoCalibrateBtn.disabled = false;
                autoCalibrateBtn.textContent = "✨ Auto-Calibrate to Room";
                autoCalibrateBtn.style.background = "#ab47bc";
            }, 3000);
            
        }, 3000);
    });

    // --- SLIDERS ---
    micSlider.addEventListener('input', e => { if(micGain) micGain.gain.value = e.target.value; document.getElementById('mic-val').textContent = Math.round(e.target.value * 100) + "%"; });
    echoSlider.addEventListener('input', e => { if(feedbackNode) feedbackNode.gain.value = e.target.value; document.getElementById('echo-val').textContent = Math.round(e.target.value * 100) + "%"; });
    videoSlider.addEventListener('input', e => { if(videoGain) videoGain.gain.value = e.target.value; document.getElementById('vid-val').textContent = Math.round(e.target.value * 100) + "%"; });
    humSlider.addEventListener('input', e => { if(humFilterNode) humFilterNode.frequency.value = e.target.value; document.getElementById('hum-val').textContent = e.target.value + " Hz"; });
    screechSlider.addEventListener('input', e => { if(screechFilterNode) screechFilterNode.frequency.value = e.target.value; document.getElementById('screech-val').textContent = e.target.value + " Hz"; });

    // --- RECORDING ---
    startRecBtn.addEventListener('click', () => {
        recordedChunks = [];
        const combinedStream = new MediaStream();
        combinedStream.addTrack(audioDest.stream.getAudioTracks()[0]);
        
        const captureFunc = localVideo.captureStream || localVideo.mozCaptureStream;
        if (captureFunc) {
            const vidStream = captureFunc.call(localVideo);
            if (vidStream.getVideoTracks().length > 0) combinedStream.addTrack(vidStream.getVideoTracks()[0]);
        }

        try { mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' }); } 
        catch (e) { mediaRecorder = new MediaRecorder(combinedStream); }

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const url = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
            downloadLink.href = url; downloadLink.download = 'karaoke.webm'; downloadLink.style.display = 'block';
        };

        mediaRecorder.start(); localVideo.play();
        startRecBtn.disabled = true; stopRecBtn.disabled = false;
        startRecBtn.textContent = "Recording..."; downloadLink.style.display = 'none';
    });

    stopRecBtn.addEventListener('click', () => {
        mediaRecorder.stop(); localVideo.pause();
        startRecBtn.disabled = false; stopRecBtn.disabled = true;
        startRecBtn.textContent = "🔴 Start";
    });
</script>
</body>
</html>
