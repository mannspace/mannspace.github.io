<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Studio Pro v4</title>
    <style>
        :root {
            --primary: #00e5ff;
            --danger: #ff1744;
            --success: #00e676;
            --warning: #ffea00;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: #fff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 15px; }
        h2 { text-align: center; margin: 5px 0; font-weight: 400; color: var(--primary); }
        
        .card {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border); padding: 20px; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
            margin-bottom: 15px; color: #b0bec5; border-bottom: 1px solid var(--card-border); padding-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Media Players */
        video { width: 100%; border-radius: 12px; display: none; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #yt-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; display: none; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #yt-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Buttons & Inputs */
        .input-group { display: flex; gap: 10px; }
        input[type="text"] {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.3); color: white; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        
        button {
            background: var(--primary); color: #000; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:active:not(:disabled) { transform: scale(0.98); }
        button:disabled { background: rgba(255,255,255,0.1); color: #666; cursor: not-allowed; }
        
        .btn-yt { background: var(--danger); color: white; }
        .btn-mic { width: 100%; padding: 16px; font-size: 16px; margin-bottom: 15px; background: #00adb5; color: white;}
        .btn-auto { background: #ab47bc; color: white; width: 100%; margin-bottom: 15px; }
        
        /* File Upload */
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 15px; }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .file-upload-btn { background: rgba(255,255,255,0.15); color: white; width: 100%; text-align: center; border: 1px dashed var(--primary); padding: 15px; }

        /* Sliders */
        .slider-group { margin-bottom: 15px; }
        .slider-group:last-child { margin-bottom: 0; }
        label.slider-label { font-size: 13px; font-weight: 500; color: #eee; display: flex; justify-content: space-between; margin-bottom: 8px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--primary); cursor: pointer; box-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        input[type="range"]:disabled::-webkit-slider-thumb { background: #555; box-shadow: none; }

        /* Toggle Button */
        .toggle-btn { background: #393e46; color: white; width: 100%; padding: 10px; margin-top: 5px; font-size: 13px; border: 1px solid #555; }
        .toggle-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Recorder */
        .rec-controls { display: flex; gap: 10px; margin-top: 10px; }
        .rec-controls button { flex: 1; }
        #start-rec { background: var(--danger); color: white; }
        #download-link { display: none; text-align: center; margin-top: 15px; background: var(--success); padding: 12px; border-radius: 8px; text-decoration: none; color: black; font-weight: bold; }
        
        .badge { background: var(--danger); color: white; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .badge-pro { background: #ab47bc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Karaoke Studio</h2>

    <!-- Media Source -->
    <div class="card">
        <div class="card-header">1. Select Track</div>
        <div class="file-upload-wrapper">
            <!-- Updated to accept Audio AND Video -->
            <button class="file-upload-btn">🎵 Select Local Audio/Video File</button>
            <input type="file" id="media-upload" accept="video/*, audio/*">
        </div>
        <div class="input-group">
            <input type="text" id="yt-url" placeholder="Or paste YouTube Link...">
            <button class="btn-yt" id="yt-load-btn">Load</button>
        </div>
    </div>

    <!-- Media Elements -->
    <video id="local-media" controls playsinline></video>
    <div id="yt-container"></div>

    <!-- Audio Mixer -->
    <div class="card">
        <div class="card-header">2. Main Mixer</div>
        <button class="btn-mic" id="start-mic-btn">🎙️ Connect Microphone</button>
        
        <div class="slider-group">
            <label class="slider-label">Mic Volume <span id="mic-val">100%</span></label>
            <input type="range" id="mic-volume" min="0" max="3" step="0.1" value="1" disabled>
        </div>
        <div class="slider-group">
            <label class="slider-label">Studio Echo <span id="echo-val">0%</span></label>
            <input type="range" id="echo-volume" min="0" max="1" step="0.05" value="0" disabled>
        </div>
        
        <div class="slider-group" id="local-vid-vol-container">
            <label class="slider-label">Music Volume <span id="vid-val">100%</span></label>
            <input type="range" id="video-volume" min="0" max="2" step="0.1" value="1" disabled>
            
            <!-- NEW: Vocal Remover Toggle -->
            <button class="toggle-btn" id="vocal-remover-btn" disabled>🎤 Suppress Original Vocals (Off)</button>
        </div>
    </div>

    <!-- Anti-Feedback Engine -->
    <div class="card" id="feedback-panel">
        <div class="card-header">
            3. Room EQ 
            <span class="badge badge-pro">SAFE CALIBRATE</span>
        </div>
        <button class="btn-auto" id="auto-calibrate-btn" disabled>✨ Auto-Fix Humming</button>
        
        <div class="slider-group">
            <label class="slider-label">Cut Low Bass (Hum) <span id="hum-val">20 Hz</span></label>
            <input type="range" id="hum-filter" min="20" max="500" step="10" value="20" disabled>
        </div>
        <div class="slider-group">
            <label class="slider-label">Cut High Treble (Screech) <span id="screech-val">20000 Hz</span></label>
            <input type="range" id="screech-filter" min="3000" max="20000" step="500" value="20000" disabled>
        </div>
    </div>

    <!-- Recorder -->
    <div class="card" id="rec-panel">
        <div class="card-header">
            4. Recorder
            <span class="badge">REC</span>
        </div>
        <p style="font-size: 12px; color: #ffea00; margin: 0 0 10px 0;" id="rec-warning">⚠️ Requires local file to record.</p>
        <div class="rec-controls">
            <button id="start-rec" disabled>🔴 Start</button>
            <button id="stop-rec" disabled>⏹ Stop & Save</button>
        </div>
        <a id="download-link" href="#">⬇️ Download Track</a>
    </div>
</div>

<script>
    // Elements
    const mediaUpload = document.getElementById('media-upload');
    const ytUrlInput = document.getElementById('yt-url');
    const ytLoadBtn = document.getElementById('yt-load-btn');
    const localMedia = document.getElementById('local-media');
    const ytContainer = document.getElementById('yt-container');
    const startMicBtn = document.getElementById('start-mic-btn');
    const autoCalibrateBtn = document.getElementById('auto-calibrate-btn');
    const vocalRemoverBtn = document.getElementById('vocal-remover-btn');
    
    // Sliders
    const micSlider = document.getElementById('mic-volume');
    const echoSlider = document.getElementById('echo-volume');
    const videoSlider = document.getElementById('video-volume');
    const humSlider = document.getElementById('hum-filter');
    const screechSlider = document.getElementById('screech-filter');
    const vidVolContainer = document.getElementById('local-vid-vol-container'); 
    
    // Recording
    const startRecBtn = document.getElementById('start-rec');
    const stopRecBtn = document.getElementById('stop-rec');
    const downloadLink = document.getElementById('download-link');
    const recWarning = document.getElementById('rec-warning');

    // Audio Graph State
    let audioCtx;
    let micSource, micGain, delayNode, feedbackNode, compressor, audioDest;
    let humFilterNode, screechFilterNode;
    let videoSource, videoGain, normalBypassGain, vocalRemoveGain;
    
    let isMicActive = false;
    let usingLocalMedia = false;
    let vocalsSuppressed = false;
    let mediaRecorder, recordedChunks = [];

    // --- 1. MEDIA HANDLING (AUDIO/VIDEO) ---
    mediaUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            ytContainer.style.display = 'none';
            localMedia.src = URL.createObjectURL(file);
            localMedia.style.display = 'block';
            vidVolContainer.style.display = 'block'; 
            usingLocalMedia = true;
            document.querySelector('.file-upload-btn').textContent = `🎵 ${file.name.substring(0, 25)}...`;
            
            recWarning.style.display = 'none';
            if (isMicActive) {
                startRecBtn.disabled = false;
                vocalRemoverBtn.disabled = false;
            }
        }
    });

    ytLoadBtn.addEventListener('click', () => {
        const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/i;
        const match = ytUrlInput.value.match(regExp);
        if (match && match[1]) {
            localMedia.style.display = 'none'; localMedia.pause();
            vidVolContainer.style.display = 'none'; usingLocalMedia = false;
            ytContainer.style.display = 'block';
            ytContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${match[1]}?autoplay=0&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            
            recWarning.style.display = 'block';
            recWarning.textContent = "⚠️ YouTube loaded. Recording/Vocal-Remove disabled.";
            startRecBtn.disabled = true; vocalRemoverBtn.disabled = true;
        } else {
            alert("Invalid YouTube link.");
        }
    });

    // --- 2. MASTER AUDIO INITIALIZATION ---
    startMicBtn.addEventListener('click', async () => {
        if (isMicActive) return;
        
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });

            // 1. Setup Mic Path
            micSource = audioCtx.createMediaStreamSource(stream);
            humFilterNode = audioCtx.createBiquadFilter();
            humFilterNode.type = 'highpass'; humFilterNode.frequency.value = 20;
            screechFilterNode = audioCtx.createBiquadFilter();
            screechFilterNode.type = 'lowpass'; screechFilterNode.frequency.value = 20000;
            
            micGain = audioCtx.createGain(); micGain.gain.value = 1.0;
            compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.value = -24; compressor.ratio.value = 8;
            
            delayNode = audioCtx.createDelay(); delayNode.delayTime.value = 0.3; 
            feedbackNode = audioCtx.createGain(); feedbackNode.gain.value = 0; // Default off!
            audioDest = audioCtx.createMediaStreamDestination();

            // Connect Mic
            micSource.connect(humFilterNode).connect(screechFilterNode).connect(micGain);
            micGain.connect(compressor);
            // Echo Loop
            micGain.connect(delayNode).connect(feedbackNode).connect(delayNode).connect(compressor);
            compressor.connect(audioCtx.destination);
            compressor.connect(audioDest);

            // 2. Setup Local Media & Vocal Remover Path
            if (!videoSource) {
                videoSource = audioCtx.createMediaElementSource(localMedia);
                videoGain = audioCtx.createGain(); videoGain.gain.value = 1.0;
                
                normalBypassGain = audioCtx.createGain(); normalBypassGain.gain.value = 1.0;
                vocalRemoveGain = audioCtx.createGain(); vocalRemoveGain.gain.value = 0.0; // Off by default

                // Phase Inversion Engine (Center Cancellation)
                const splitter = audioCtx.createChannelSplitter(2);
                const merger = audioCtx.createChannelMerger(2);
                const inverter = audioCtx.createGain(); inverter.gain.value = -1;

                videoSource.connect(normalBypassGain).connect(videoGain); // Normal Path
                
                // Suppressor Path
                videoSource.connect(splitter);
                splitter.connect(merger, 0, 0); // L -> L
                splitter.connect(inverter, 1);  // R -> Inverter
                inverter.connect(merger, 0, 0); // Inverted R -> L
                splitter.connect(merger, 0, 1); // L -> R
                inverter.connect(merger, 0, 1); // Inverted R -> R
                merger.connect(vocalRemoveGain).connect(videoGain);

                videoGain.connect(audioCtx.destination);
                videoGain.connect(audioDest);
            }

            // Unlock UI Elements
            [micSlider, echoSlider, videoSlider, humSlider, screechSlider].forEach(s => s.disabled = false);
            autoCalibrateBtn.disabled = false;
            if (usingLocalMedia) {
                startRecBtn.disabled = false;
                vocalRemoverBtn.disabled = false;
            }
            
            startMicBtn.style.background = "var(--success)";
            startMicBtn.style.color = "#000";
            startMicBtn.textContent = "🎙️ System Active";
            isMicActive = true;
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
        } catch (err) { alert("Mic Error. Ensure HTTPS and grant permissions."); }
    });

    // --- 3. VOCAL SUPPRESSOR TOGGLE ---
    vocalRemoverBtn.addEventListener('click', () => {
        if(!isMicActive) return;
        vocalsSuppressed = !vocalsSuppressed;
        if (vocalsSuppressed) {
            normalBypassGain.gain.value = 0.0;
            vocalRemoveGain.gain.value = 1.0;
            vocalRemoverBtn.classList.add('active');
            vocalRemoverBtn.textContent = "🎤 Vocal Suppression: ON";
        } else {
            normalBypassGain.gain.value = 1.0;
            vocalRemoveGain.gain.value = 0.0;
            vocalRemoverBtn.classList.remove('active');
            vocalRemoverBtn.textContent = "🎤 Suppress Original Vocals (Off)";
        }
    });

    // --- 4. SAFE AUTO-CALIBRATE ---
    autoCalibrateBtn.addEventListener('click', () => {
        if(!isMicActive) return;
        autoCalibrateBtn.disabled = true;
        autoCalibrateBtn.textContent = "Analyzing room (2s)...";
        
        // Safer calibration: Restrict gain boosts to avoid sudden screeching
        setTimeout(() => {
            // Apply safe baseline EQ for general room feedback
            humFilterNode.frequency.value = 120; // Aggressive low cut
            screechFilterNode.frequency.value = 8000; // Aggressive high cut
            micGain.gain.value = 1.2; // Modest, safe boost
            
            humSlider.value = 120; document.getElementById('hum-val').textContent = "120 Hz";
            screechSlider.value = 8000; document.getElementById('screech-val').textContent = "8000 Hz";
            micSlider.value = 1.2; document.getElementById('mic-val').textContent = "120%";
            
            autoCalibrateBtn.textContent = "✅ EQ Safely Applied!";
            autoCalibrateBtn.style.background = "var(--success)";
            
            setTimeout(() => {
                autoCalibrateBtn.disabled = false;
                autoCalibrateBtn.textContent = "✨ Auto-Fix Humming";
                autoCalibrateBtn.style.background = "#ab47bc";
            }, 2500);
        }, 2000);
    });

    // --- 5. REAL-TIME SLIDERS (STABILIZED) ---
    // parseFloat ensures the API doesn't crash on string values
    micSlider.addEventListener('input', e => { if(micGain) micGain.gain.value = parseFloat(e.target.value); document.getElementById('mic-val').textContent = Math.round(e.target.value * 100) + "%"; });
    echoSlider.addEventListener('input', e => { if(feedbackNode) feedbackNode.gain.value = parseFloat(e.target.value); document.getElementById('echo-val').textContent = Math.round(e.target.value * 100) + "%"; });
    videoSlider.addEventListener('input', e => { if(videoGain) videoGain.gain.value = parseFloat(e.target.value); document.getElementById('vid-val').textContent = Math.round(e.target.value * 100) + "%"; });
    humSlider.addEventListener('input', e => { if(humFilterNode) humFilterNode.frequency.value = parseFloat(e.target.value); document.getElementById('hum-val').textContent = e.target.value + " Hz"; });
    screechSlider.addEventListener('input', e => { if(screechFilterNode) screechFilterNode.frequency.value = parseFloat(e.target.value); document.getElementById('screech-val').textContent = e.target.value + " Hz"; });

    // --- 6. RECORDING ENGINE ---
    startRecBtn.addEventListener('click', () => {
        recordedChunks = [];
        const combinedStream = new MediaStream();
        combinedStream.addTrack(audioDest.stream.getAudioTracks()[0]);
        
        const captureFunc = localMedia.captureStream || localMedia.mozCaptureStream;
        if (captureFunc) {
            const vidStream = captureFunc.call(localMedia);
            if (vidStream.getVideoTracks().length > 0) combinedStream.addTrack(vidStream.getVideoTracks()[0]);
        }

        let options = { mimeType: 'video/webm' };
        if (typeof MediaRecorder !== "undefined" && !MediaRecorder.isTypeSupported('video/webm')) {
            options = { mimeType: 'video/mp4' };
        }

        try { mediaRecorder = new MediaRecorder(combinedStream, options); } 
        catch (e) { mediaRecorder = new MediaRecorder(combinedStream); }

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const ext = options.mimeType.includes('mp4') ? 'mp4' : 'webm';
            const url = URL.createObjectURL(new Blob(recordedChunks, { type: options.mimeType }));
            downloadLink.href = url; downloadLink.download = `karaoke_recording.${ext}`; downloadLink.style.display = 'block';
        };

        mediaRecorder.start(); localMedia.play();
        startRecBtn.disabled = true; stopRecBtn.disabled = false;
        startRecBtn.textContent = "Recording..."; downloadLink.style.display = 'none';
    });

    stopRecBtn.addEventListener('click', () => {
        mediaRecorder.stop(); localMedia.pause();
        startRecBtn.disabled = false; stopRecBtn.disabled = true;
        startRecBtn.textContent = "🔴 Start";
    });
</script>
</body>
</html>
