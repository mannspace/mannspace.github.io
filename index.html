<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Studio Pro - Direct Audio</title>
    <style>
        :root {
            --primary: #00e5ff;
            --danger: #ff1744;
            --success: #00e676;
            --bg-gradient: linear-gradient(135deg, #0d1117, #161b22, #21262d);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: #fff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 15px; }
        h2 { text-align: center; margin: 5px 0; font-weight: 300; color: var(--primary); letter-spacing: 1px; }
        
        .card {
            background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 15px; color: #8b949e; border-bottom: 1px solid var(--card-border); padding-bottom: 10px;
        }

        /* Media Players */
        video { width: 100%; border-radius: 8px; display: none; background: #000; margin-bottom: 15px; }
        #yt-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; display: none; border-radius: 8px; overflow: hidden; }
        #yt-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Buttons & Inputs */
        .input-group { display: flex; gap: 10px; margin-top: 10px;}
        input[type="text"] {
            flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.4); color: white; outline: none;
        }
        
        button {
            background: var(--primary); color: #000; border: none; padding: 12px;
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:active:not(:disabled) { transform: scale(0.97); }
        button:disabled { background: rgba(255,255,255,0.1); color: #666; cursor: not-allowed; }
        
        .btn-yt { background: #ff0000; color: white; }
        .btn-mic { width: 100%; padding: 15px; font-size: 16px; margin-bottom: 10px; background: #00adb5; color: white;}
        .btn-mic.active { background: var(--danger); color: white; }
        
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .file-upload-btn { background: rgba(255,255,255,0.1); color: white; width: 100%; text-align: center; border: 1px dashed #666; padding: 15px; }

        /* Sliders */
        .slider-group { margin-bottom: 18px; }
        .slider-group:last-child { margin-bottom: 0; }
        label.slider-label { font-size: 13px; font-weight: 500; color: #c9d1d9; display: flex; justify-content: space-between; margin-bottom: 8px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; }
        input[type="range"]:disabled::-webkit-slider-thumb { background: #555; }

        .toggle-btn { background: #2b333a; color: #aaa; width: 100%; padding: 12px; margin-top: 5px; font-size: 13px; border: 1px solid #444; }
        .toggle-btn.active { background: #9c27b0; color: #fff; border-color: #9c27b0; }

        /* Recorder */
        .rec-controls { display: flex; gap: 10px; margin-top: 10px; }
        .rec-controls button { flex: 1; }
        #start-rec { background: var(--danger); color: white; }
        #download-link { display: none; text-align: center; margin-top: 15px; background: var(--success); padding: 12px; border-radius: 6px; text-decoration: none; color: black; font-weight: bold; }
        
        .info-text { font-size: 12px; color: #ffeb3b; text-align: center; margin-top: 0px; margin-bottom: 15px; }
        .hint-text { font-size: 11px; color: #8b949e; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Karaoke Studio</h2>

    <!-- Media Source -->
    <div class="card">
        <div class="card-header">1. Load Track</div>
        <div class="file-upload-wrapper">
            <button class="file-upload-btn" id="file-btn-text">🎵 Select Local Audio or Video File</button>
            <input type="file" id="media-upload" accept="video/*, audio/*">
        </div>
        <div class="input-group">
            <input type="text" id="yt-url" placeholder="Or paste YouTube Link...">
            <button class="btn-yt" id="yt-load-btn">Load YT</button>
        </div>
    </div>

    <!-- Players -->
    <video id="local-media" controls playsinline crossorigin="anonymous"></video>
    <div id="yt-container"></div>

    <!-- Mixer -->
    <div class="card">
        <div class="card-header">2. Direct Mixer</div>
        <button class="btn-mic" id="start-mic-btn">🎙️ Turn On Microphone</button>
        <p class="hint-text">For absolute best quality and zero physical echo, use wired headphones.</p>
        
        <div class="slider-group">
            <label class="slider-label">Microphone Volume <span id="mic-val">100%</span></label>
            <input type="range" id="mic-volume" min="0" max="3" step="0.1" value="1" disabled>
        </div>
        <div class="slider-group">
            <label class="slider-label">Studio Echo <span id="echo-val">0%</span></label>
            <input type="range" id="echo-volume" min="0" max="1" step="0.05" value="0" disabled>
        </div>
        
        <div class="slider-group" id="media-vol-container">
            <label class="slider-label">Music Volume <span id="vid-val">100%</span></label>
            <input type="range" id="video-volume" min="0" max="2" step="0.1" value="1" disabled>
            
            <button class="toggle-btn" id="vocal-remover-btn" disabled>🎤 Suppress Track Vocals (Off)</button>
        </div>
    </div>

    <!-- Recorder -->
    <div class="card" id="rec-panel">
        <div class="card-header">3. Studio Recorder</div>
        <p class="info-text" id="rec-warning">⚠️ Load a local file and turn on Mic to record.</p>
        <div class="rec-controls">
            <button id="start-rec" disabled>🔴 Start Recording</button>
            <button id="stop-rec" disabled>⏹ Stop</button>
        </div>
        <a id="download-link" href="#">⬇️ Save Recording</a>
    </div>
</div>

<script>
    const mediaUpload = document.getElementById('media-upload');
    const ytUrlInput = document.getElementById('yt-url');
    const ytLoadBtn = document.getElementById('yt-load-btn');
    const localMedia = document.getElementById('local-media');
    const ytContainer = document.getElementById('yt-container');
    const startMicBtn = document.getElementById('start-mic-btn');
    const vocalRemoverBtn = document.getElementById('vocal-remover-btn');
    
    const micSlider = document.getElementById('mic-volume');
    const echoSlider = document.getElementById('echo-volume');
    const videoSlider = document.getElementById('video-volume');
    const fileBtnText = document.getElementById('file-btn-text');
    
    const startRecBtn = document.getElementById('start-rec');
    const stopRecBtn = document.getElementById('stop-rec');
    const downloadLink = document.getElementById('download-link');
    const recWarning = document.getElementById('rec-warning');

    let audioCtx, micStream, micSource, mediaElementSource;
    let micGain, mediaGain, masterGain, audioDest;
    let echoGateGain, delayNode, feedbackNode; // Echo completely isolated
    let normalBypassGain, vocalRemoveGain;
    
    let isMicActive = false;
    let usingLocalMedia = false;
    let vocalsSuppressed = false;
    let mediaRecorder, recordedChunks = [];

    // --- 1. MEDIA LOADING ---
    mediaUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            ytContainer.style.display = 'none';
            localMedia.src = URL.createObjectURL(file);
            localMedia.style.display = 'block';
            usingLocalMedia = true;
            fileBtnText.textContent = `🎵 ${file.name.substring(0, 30)}...`;
            videoSlider.disabled = false;
            
            recWarning.style.display = 'none';
            checkRecordingEligibility();
            if (isMicActive) setupMediaRouting();
        }
    });

    ytLoadBtn.addEventListener('click', () => {
        const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/i;
        const match = ytUrlInput.value.match(regExp);
        if (match && match[1]) {
            localMedia.style.display = 'none'; localMedia.pause();
            usingLocalMedia = false;
            ytContainer.style.display = 'block';
            ytContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${match[1]}?autoplay=0&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            
            recWarning.style.display = 'block';
            recWarning.textContent = "⚠️ Recording disabled for YouTube due to browser security.";
            startRecBtn.disabled = true; vocalRemoverBtn.disabled = true;
        } else {
            alert("Invalid YouTube link.");
        }
    });

    function checkRecordingEligibility() {
        if (usingLocalMedia && isMicActive) {
            startRecBtn.disabled = false;
            recWarning.style.display = 'none';
        } else {
            startRecBtn.disabled = true;
        }
    }

    // --- 2. AUDIO ENGINE & BLUETOOTH FIX ---
    startMicBtn.addEventListener('click', async () => {
        if (isMicActive) {
            if (micStream) micStream.getTracks().forEach(track => track.stop());
            if (micSource) micSource.disconnect();
            
            startMicBtn.classList.remove('active');
            startMicBtn.textContent = "🎙️ Turn On Microphone";
            micSlider.disabled = true; echoSlider.disabled = true;
            isMicActive = false; checkRecordingEligibility();
            return;
        }

        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // BLUETOOTH FIX: Forcing these to FALSE tells the OS "This is pro audio, do not switch to phone call mode"
            micStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { 
                    echoCancellation: false, 
                    noiseSuppression: false, 
                    autoGainControl: false 
                } 
            });

            if (!masterGain) {
                masterGain = audioCtx.createGain();
                audioDest = audioCtx.createMediaStreamDestination(); 
                masterGain.connect(audioCtx.destination); 
                masterGain.connect(audioDest); 
            }

            micSource = audioCtx.createMediaStreamSource(micStream);
            micGain = audioCtx.createGain(); 
            micGain.gain.value = parseFloat(micSlider.value);
            
            // ECHO FIX: The Echo Gate
            // The echo system is entirely separated from the direct microphone feed.
            echoGateGain = audioCtx.createGain(); echoGateGain.gain.value = 0; // Starts completely silent
            delayNode = audioCtx.createDelay(); delayNode.delayTime.value = 0.3; 
            feedbackNode = audioCtx.createGain(); feedbackNode.gain.value = 0;

            // Direct route: Mic -> MicGain -> Master (Zero delay, zero echo)
            micSource.connect(micGain);
            micGain.connect(masterGain);
            
            // Echo route: MicGain -> Gate -> Delay -> Master
            micGain.connect(echoGateGain);
            echoGateGain.connect(delayNode);
            delayNode.connect(masterGain);
            delayNode.connect(feedbackNode);
            feedbackNode.connect(delayNode); 

            if (usingLocalMedia) setupMediaRouting();

            micSlider.disabled = false;
            echoSlider.disabled = false;
            
            startMicBtn.classList.add('active');
            startMicBtn.textContent = "🔴 Mic Active (Click to Stop)";
            isMicActive = true;
            
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            checkRecordingEligibility();
            
        } catch (err) { 
            alert("Microphone Error: Please ensure permissions are granted."); 
        }
    });

    function setupMediaRouting() {
        if (!audioCtx || mediaElementSource) return;
        
        mediaElementSource = audioCtx.createMediaElementSource(localMedia);
        mediaGain = audioCtx.createGain(); mediaGain.gain.value = parseFloat(videoSlider.value);
        
        normalBypassGain = audioCtx.createGain(); normalBypassGain.gain.value = 1.0;
        vocalRemoveGain = audioCtx.createGain(); vocalRemoveGain.gain.value = 0.0;

        const splitter = audioCtx.createChannelSplitter(2);
        const merger = audioCtx.createChannelMerger(2);
        const inverter = audioCtx.createGain(); inverter.gain.value = -1;

        mediaElementSource.connect(normalBypassGain).connect(mediaGain);
        
        mediaElementSource.connect(splitter);
        splitter.connect(merger, 0, 0); 
        splitter.connect(inverter, 1);  
        inverter.connect(merger, 0, 0); 
        splitter.connect(merger, 0, 1); 
        inverter.connect(merger, 0, 1); 
        merger.connect(vocalRemoveGain).connect(mediaGain);

        mediaGain.connect(masterGain);
        vocalRemoverBtn.disabled = false;
    }

    vocalRemoverBtn.addEventListener('click', () => {
        if (!mediaElementSource) return;
        vocalsSuppressed = !vocalsSuppressed;
        if (vocalsSuppressed) {
            normalBypassGain.gain.value = 0.0; vocalRemoveGain.gain.value = 1.0;
            vocalRemoverBtn.classList.add('active'); vocalRemoverBtn.textContent = "🎤 Vocal Suppression: ON";
        } else {
            normalBypassGain.gain.value = 1.0; vocalRemoveGain.gain.value = 0.0;
            vocalRemoverBtn.classList.remove('active'); vocalRemoverBtn.textContent = "🎤 Suppress Track Vocals (Off)";
        }
    });

    // --- 3. HARDWARE SLIDER CONTROLS ---
    micSlider.addEventListener('input', e => { 
        if(micGain) micGain.gain.value = parseFloat(e.target.value); 
        document.getElementById('mic-val').textContent = Math.round(e.target.value * 100) + "%"; 
    });
    
    echoSlider.addEventListener('input', e => { 
        const val = parseFloat(e.target.value);
        if(echoGateGain && feedbackNode) {
            // Only send audio into the echo chamber if the slider is above 0
            echoGateGain.gain.value = val > 0 ? 1 : 0; 
            feedbackNode.gain.value = val;
        }
        document.getElementById('echo-val').textContent = Math.round(val * 100) + "%"; 
    });
    
    videoSlider.addEventListener('input', e => { 
        const val = parseFloat(e.target.value);
        if(mediaGain) {
            mediaGain.gain.value = val; 
        } else {
            localMedia.volume = val > 1 ? 1 : val;
        }
        document.getElementById('vid-val').textContent = Math.round(val * 100) + "%"; 
    });

    // --- 4. RECORDING ENGINE ---
    startRecBtn.addEventListener('click', () => {
        recordedChunks = [];
        const tracks = [...audioDest.stream.getAudioTracks()];
        
        if (localMedia.captureStream) {
            const vidStream = localMedia.captureStream();
            if (vidStream.getVideoTracks().length > 0) {
                tracks.push(vidStream.getVideoTracks()[0]);
            }
        }
        
        const combinedStream = new MediaStream(tracks);
        let options = { mimeType: 'video/webm' };
        if (typeof MediaRecorder !== "undefined" && !MediaRecorder.isTypeSupported('video/webm')) {
            options = { mimeType: 'video/mp4' };
        }

        try { mediaRecorder = new MediaRecorder(combinedStream, options); } 
        catch (e) { mediaRecorder = new MediaRecorder(combinedStream); }

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const ext = (mediaRecorder.mimeType || options.mimeType).includes('mp4') ? 'mp4' : 'webm';
            const url = URL.createObjectURL(new Blob(recordedChunks, { type: mediaRecorder.mimeType }));
            downloadLink.href = url; downloadLink.download = `Studio_Recording.${ext}`; downloadLink.style.display = 'block';
        };

        mediaRecorder.start(); localMedia.play();
        startRecBtn.disabled = true; stopRecBtn.disabled = false;
        startRecBtn.textContent = "Recording in Progress..."; downloadLink.style.display = 'none';
    });

    stopRecBtn.addEventListener('click', () => {
        mediaRecorder.stop(); localMedia.pause();
        startRecBtn.disabled = false; stopRecBtn.disabled = true;
        startRecBtn.textContent = "🔴 Start Recording";
    });
</script>
</body>
</html>
